<svg width="150" height="150" viewBox="0 0 150 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow-wide" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-tight" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes flicker {
        0%, 88%, 100% { opacity: 1; }
        89%           { opacity: 0.86; }
        91%           { opacity: 0.94; }
        93%           { opacity: 0.78; }
        95%           { opacity: 0.96; }
      }
      .neon { animation: flicker 16s infinite; }
    </style>
  </defs>

  <!-- Dark background -->
  <rect width="150" height="150" fill="oklch(0.10 0.02 55)" rx="18"/>

  <g class="neon">
    <!-- Layer 1: wide purple halo -->
    <polyline
      points="18,22 42,128 75,68 108,128 132,22"
      stroke="oklch(0.62 0.26 322)" stroke-width="14"
      stroke-linecap="round" stroke-linejoin="round"
      filter="url(#glow-wide)" opacity="0.9"/>

    <!-- Layer 2: tight inner glow -->
    <polyline
      points="18,22 42,128 75,68 108,128 132,22"
      stroke="oklch(0.82 0.20 322)" stroke-width="10"
      stroke-linecap="round" stroke-linejoin="round"
      filter="url(#glow-tight)"/>

    <!-- Layer 3: white-hot core tube -->
    <polyline
      points="18,22 42,128 75,68 108,128 132,22"
      stroke="oklch(0.97 0.04 322)" stroke-width="5"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
